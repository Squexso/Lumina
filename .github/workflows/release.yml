name: Release

# Builds the launcher (.exe) + the three client mods and publishes a GitHub Release
# whenever you push a version tag like v0.2.0. The Release assets (incl. latest.json)
# are exactly what LuminaMC's built-in auto-updater reads.

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:   # lets you trigger it manually from the Actions tab

permissions:
  contents: write       # needed to create the Release

jobs:
  build:
    runs-on: windows-latest    # required so jpackage can produce a Windows .exe
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build client mods (Fabric / Forge / NeoForge)
        working-directory: lumina-multiloader
        shell: bash
        run: ./gradlew build --no-daemon

      - name: Package launcher (.exe) + update feed
        working-directory: launcher
        shell: bash
        run: |
          ./gradlew packageLauncher publishRelease "-PbaseUrl=https://github.com/Squexso/Lumina/releases/download/${{ github.ref_name }}" --no-daemon
          echo "=== build/release ==="; ls -la build/release
          echo "=== build/dist ===";    ls -la build/dist

      # Code-signing happens further down via SignPath (free for OSS) — it signs the
      # .exe inside the release zip so Windows SmartScreen trusts it. See docs/SIGNING.md.

      - name: Collect release artifacts
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist
          # Launcher app-image (LuminaMC/ folder with LuminaMC.exe + bundled Java) → one zip
          ( cd launcher/build/dist && 7z a -r "$GITHUB_WORKSPACE/dist/LuminaMC-windows.zip" LuminaMC >/dev/null )
          # Update feed — REQUIRED for auto-update; fail the build if it's missing.
          cp launcher/build/release/latest.json dist/
          cp launcher/build/release/*.jar       dist/
          # Client mods (optional — the launcher already bundles them)
          find lumina-multiloader -path '*/build/libs/*.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar' -exec cp {} dist/ \; || true
          ls -la dist

      # ── Code-sign the Windows .exe via SignPath (FREE for open-source projects).
      #    Signs the PE files inside LuminaMC-windows.zip so Windows SmartScreen stops
      #    flagging the download as "unknown publisher". This is a NO-OP until the
      #    SignPath repo variables + secret are configured (see docs/SIGNING.md) —
      #    releases keep building unsigned until then, so nothing breaks meanwhile.
      - name: Upload zip for signing
        if: ${{ vars.SIGNPATH_ORGANIZATION_ID != '' }}
        id: unsigned
        uses: actions/upload-artifact@v4
        with:
          name: luminamc-windows-unsigned
          path: dist/LuminaMC-windows.zip
          if-no-files-found: error

      - name: Sign with SignPath
        if: ${{ vars.SIGNPATH_ORGANIZATION_ID != '' }}
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_ARTIFACT_CONFIG_SLUG }}
          github-artifact-id: ${{ steps.unsigned.outputs.artifact-id }}
          wait-for-completion: true
          skip-decompress: true
          output-artifact-directory: signed

      - name: Swap in the signed zip
        if: ${{ vars.SIGNPATH_ORGANIZATION_ID != '' }}
        shell: bash
        run: |
          set -euxo pipefail
          signed_zip="$(find signed -name '*.zip' | head -1)"
          test -n "$signed_zip"
          cp "$signed_zip" dist/LuminaMC-windows.zip
          echo "Signed zip in place:"; ls -la dist/LuminaMC-windows.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          make_latest: true
          generate_release_notes: true
